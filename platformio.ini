[platformio]
extra_configs = variants/*/platformio.ini

[common]
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    https://github.com/ESP32Async/AsyncTCP.git#v3.3.8
    https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.7.4
    knolleary/PubSubClient @ ^2.8

build_flags =
        -I variants/${PIOENV}

[env]
platform = espressif32 @ 6.11.0
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.filesystem = littlefs

; Partition scheme
board_build.partitions = partitions/huge_app_littlefs.csv

; Host-side unit tests: PlatformIO's `native` platform compiles with the
; host toolchain so pure C++ headers (no Arduino deps) can be exercised
; without flashing. Run with: pio test -e native
[env:native]
platform = native
framework =
test_framework = unity
test_build_src = no
build_flags = -std=gnu++17 -Wall -Wextra
build_src_filter = -<*>
