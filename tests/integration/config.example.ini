# expLORA Gateway integration-test configuration.
#
# Copy this to config.ini (which is gitignored) and fill in your values.
# Then run:  python3 test_gateway.py --config tests/integration/config.ini
#
# Every field has a sensible default behaviour when omitted (see comments).

[gateway]
# IP address (or hostname) of the gateway on your home network. If reachable,
# provisioning is skipped entirely — the script jumps straight to tests.
# Leave empty on first run (the script will discover the IP from UART after
# provisioning and you can paste it back here for future runs).
ip =

# Sketch of the AP SSID the gateway broadcasts. The full SSID includes the
# device's MAC suffix, e.g. expLORA-GW-A1B2C3. The script reads the exact
# SSID from the UART log; this prefix is only used as a fallback.
ap_ssid_prefix = expLORA-GW-

# Serial port where the gateway's USB-CDC is mounted. Leave empty to
# autodetect from common ESP32-S3 USB IDs (recommended). Override only if
# autodetect picks the wrong port.
# Mac example:    /dev/cu.usbmodem...
# Linux example:  /dev/ttyACM0
# Windows example: COM5
serial_port =

# Serial baud rate (matches monitor_speed in platformio.ini).
serial_baud = 115200

# Network interface used by the macOS networksetup call when switching WiFi.
# Ignore on Linux/Windows (the script prompts there).
wifi_interface = en0


[wifi]
# Home WiFi to provision the gateway onto. The script POSTs these to
# /config when the gateway is reachable on its AP at 192.168.4.1.
ssid =
password =

# Optional timezone string in POSIX TZ form (default is firmware's CET).
timezone = CET-1CEST,M3.5.0,M10.5.0/3


[test_sensor]
# When set, the live-packet round-trip test is enabled. The script will
# add this sensor (idempotent — skips if already configured), then poll
# /api for up to packet_timeout seconds waiting for a real LoRa packet
# from it.
#
# Leave sn empty to skip the live-packet test entirely.
sn =
key =

# Sensor type code. Match what your hardware actually sends:
#   1 = BME280 (CLIMA)
#   2 = SCD40 (CARBON)
#   3 = METEO
#   4 = VEML7700
#   81 = DIY_TEMP (0x51)
type = 1

# Display name shown on the /sensors page.
name = integration-test


[options]
# How long to wait for the first packet from test_sensor (seconds). Most
# expLORA sensors transmit every 10–15 minutes; 1200 = 20 minutes is a
# safe default.
packet_timeout = 1200

# Skip the destructive /reboot round-trip test.
skip_reboot = false


[flash]
# When true, the script invokes `pio run -e <pio_env> -t upload` before
# running tests. Useful for "always start from current firmware" workflows.
# Preserves LittleFS by default — saved WiFi config still works on reboot.
before_test = false

# When true (and before_test = true), runs `pio run -e <pio_env>` first to
# compile any pending changes before uploading.
rebuild = false

# When true (and before_test = true), runs `pio run -e <pio_env> -t erase`
# before upload. Wipes LittleFS too, forcing re-provisioning each run.
# Slow — leave false unless you specifically want truly clean state.
erase = false

# Which platformio.ini env to build/upload (the project's real target).
pio_env = esp32-s3-devkitc-1
